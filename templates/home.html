<!DOCTYPE html>
<html>
<head>
    <title>Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #00c6ff;
        }

        .result {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📊 Student Prediction</h2>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <label>Gender</label>
        <select name="gender" required>
            <option disabled selected>Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select name="ethnicity" required>
            <option disabled selected>Select</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Education</label>
        <select name="parental_level_of_education" required>
            <option disabled selected>Select</option>
            <option value="associate's degree">Associate</option>
            <option value="bachelor's degree">Bachelor</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>

        <label>Lunch</label>
        <select name="lunch" required>
            <option disabled selected>Select</option>
            <option value="free/reduced">Free/Reduced</option>
            <option value="standard">Standard</option>
        </select>

        <label>Test Preparation</label>
        <select name="test_preparation_course" required>
            <option disabled selected>Select</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required>

        <label>Writing Score</label>
        <input type="number" name="writing_score" min="0" max="100" required>

        <button class="btn" type="submit">Predict Score</button>
    </form>

    {% if results %}
    <div class="result">
        ✅ Predicted Score: {{ results }}
    </div>
    {% endif %}

</div>

</body>
</html>
